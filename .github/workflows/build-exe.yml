name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install GIS dependencies
        run: |
          pip install --only-binary :all: numpy==1.26.4
          pip install --only-binary :all: pandas==2.2.2
          pip install --only-binary :all: shapely==2.0.4
          pip install --only-binary :all: pyproj==3.6.1
          pip install --only-binary :all: fiona==1.9.6
          pip install --only-binary :all: rasterio==1.3.10
          pip install --only-binary :all: geopandas==0.14.4

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install --only-binary :all: fiona rasterio geopandas pyproj shapely || true

      - name: Verify imports
        run: |
          python -c "import numpy; import pandas; import geopandas; import fiona; import rasterio; import shapely; import pyproj; print('All GIS imports OK')"

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller build.spec --noconfirm

      - name: Install Inno Setup
        run: |
          choco install innosetup -y
          $isPath = Get-ChildItem "C:\Program Files (x86)\Inno Setup*" -Directory | Select-Object -First 1 -ExpandProperty FullName
          echo $isPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "Inno Setup path: $isPath"

      - name: Build Installer with Inno Setup
        run: |
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "Files in dist:"
          Get-ChildItem dist -Recurse | Select-Object FullName | Format-Table -AutoSize
          iscc installer.iss /DSourcePath="$PWD\"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JiangTu-Setup
          path: "**/output/*.exe"
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: "**/output/*.exe"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
