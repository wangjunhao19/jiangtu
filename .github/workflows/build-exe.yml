name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies (OSGeo4W)
        run: |
          # Install GDAL binaries needed by fiona/rasterio/geopandas
          pip install --only-binary :all: numpy==1.26.4
          pip install --only-binary :all: pandas==2.2.2
          pip install --only-binary :all: shapely==2.0.4
          pip install --only-binary :all: pyproj==3.6.1
          pip install --only-binary :all: fiona==1.9.6
          pip install --only-binary :all: rasterio==1.3.10
          pip install --only-binary :all: geopandas==0.14.4

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          # Reinstall GIS packages with binary wheels if needed
          pip install --only-binary :all: fiona rasterio geopandas pyproj shapely || true

      - name: Verify imports
        run: |
          python -c "import numpy; import pandas; import geopandas; import fiona; import rasterio; import shapely; import pyproj; print('All GIS imports OK')"

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller build.spec --noconfirm

      - name: Package output
        run: |
          Compress-Archive -Path "dist/疆途·智能巡查管理平台V1.0/*" -DestinationPath "dist/疆途智能巡查管理平台V1.0.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JiangTu-Windows-EXE
          path: dist/*.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
